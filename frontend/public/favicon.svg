<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 800"
     width="800"
     height="800">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .connection{
        stroke:#94a3b8;
        stroke-width:2;
        opacity:0.45;
      }
      .node{
        fill:url(#nodeGrad);
        stroke:#e0f2fe;
        stroke-width:2;
        filter:url(#glow);
      }
    </style>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <g class="connection">
    <line x1="150" y1="220" x2="400" y2="140"/>
    <line x1="150" y1="220" x2="400" y2="280"/>
    <line x1="150" y1="220" x2="400" y2="420"/>
    <line x1="150" y1="220" x2="400" y2="560"/>
    <line x1="150" y1="400" x2="400" y2="140"/>
    <line x1="150" y1="400" x2="400" y2="280"/>
    <line x1="150" y1="400" x2="400" y2="420"/>
    <line x1="150" y1="400" x2="400" y2="560"/>
    <line x1="150" y1="580" x2="400" y2="140"/>
    <line x1="150" y1="580" x2="400" y2="280"/>
    <line x1="150" y1="580" x2="400" y2="420"/>
    <line x1="150" y1="580" x2="400" y2="560"/>

    <line x1="400" y1="140" x2="650" y2="300"/>
    <line x1="400" y1="140" x2="650" y2="500"/>
    <line x1="400" y1="280" x2="650" y2="300"/>
    <line x1="400" y1="280" x2="650" y2="500"/>
    <line x1="400" y1="420" x2="650" y2="300"/>
    <line x1="400" y1="420" x2="650" y2="500"/>
    <line x1="400" y1="560" x2="650" y2="300"/>
    <line x1="400" y1="560" x2="650" y2="500"/>
  </g>

  <g class="node">
    <circle cx="150" cy="220" r="22"/>
    <circle cx="150" cy="400" r="22"/>
    <circle cx="150" cy="580" r="22"/>
    <circle cx="400" cy="140" r="22"/>
    <circle cx="400" cy="280" r="22"/>
    <circle cx="400" cy="420" r="22"/>
    <circle cx="400" cy="560" r="22"/>
    <circle cx="650" cy="300" r="22"/>
    <circle cx="650" cy="500" r="22"/>
  </g>
</svg>